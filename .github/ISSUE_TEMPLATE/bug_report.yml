name: Bug report
description: Something in a ModulusKit package or the CLI is broken
labels: [bug]
body:
  - type: input
    id: package
    attributes:
      label: Package and version
      description: Which ModulusKit package (and version) is affected?
      placeholder: ModulusKit.Messaging 2.0.0
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal steps or code to reproduce the behavior.
      placeholder: |
        1. modulus init Sample --transport rabbitmq
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include full error output / stack traces where possible.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: .NET 10.0.x, Windows 11 / Ubuntu 24.04
