name: CI

on:
  push:
    branches: [main]
    tags:
      - 'cli-v*'
      - 'mediator-v*'
      - 'mediator-abs-v*'
      - 'messaging-v*'
      - 'messaging-abs-v*'
      - 'messaging-rabbitmq-v*'
      - 'messaging-asb-v*'
      - 'generators-v*'
      - 'analyzers-v*'
  pull_request:
    branches: [main]
  schedule:
    # Mondays 06:00 UTC — surfaces CVEs published mid-week within a week.
    - cron: '0 6 * * 1'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # MinVer + SourceLink need full history

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Check for vulnerable packages
        shell: pwsh
        run: |
          $output = dotnet list package --vulnerable --include-transitive 2>&1 | Out-String
          Write-Host $output
          if ($output -match 'High|Critical') {
            Write-Error "Vulnerable packages detected. Fail."
            exit 1
          }

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test (unit)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "Category!=E2E&Category!=Integration" --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        # Requires the CODECOV_TOKEN repository secret; harmless no-op failure until it exists.
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage

      - name: Pack
        run: dotnet pack --no-build --configuration Release --output ./nupkgs

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: ./nupkgs/*.nupkg

  messaging-integration:
    # RabbitMQ broker integration tests (Testcontainers + Docker). Blocking: this suite is
    # the end-to-end proof of the transport layer and gates publishing.
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test (RabbitMQ integration)
        run: dotnet test tests/Modulus.Messaging.RabbitMq.IntegrationTests --no-build --configuration Release --verbosity normal --filter "Category=Integration"

  asb-integration:
    # Azure Service Bus emulator integration tests (Testcontainers: emulator + SQL companion).
    # Non-blocking until the emulator pair proves stable in CI; promote like the RabbitMQ job then.
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test (Azure Service Bus emulator integration)
        run: dotnet test tests/Modulus.Messaging.AzureServiceBus.IntegrationTests --no-build --configuration Release --verbosity normal --filter "Category=Integration"

  e2e:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # E2E scaffolds restore ModulusKit.* from this HEAD-packed feed instead of nuget.org,
      # so template<->library drift fails here rather than after publish. The fixed version
      # is safe on ephemeral runners; if a NuGet cache action is ever added to this job,
      # switch to a run-unique version to avoid cache poisoning.
      - name: Pack HEAD packages for E2E feed
        run: dotnet pack --configuration Release /p:MinVerVersionOverride=99.0.0-e2e --output ./e2e-feed

      - name: Test (E2E)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "Category=E2E"
        env:
          MODULUS_E2E_FEED: ${{ github.workspace }}/e2e-feed
          MODULUS_E2E_PACKAGE_VERSION: 99.0.0-e2e

  docs-snippets:
    # Compiles the <!-- verify -->-marked C# snippets in docs/ against the current source,
    # catching stale APIs before users do.
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Validate docs snippets
        shell: pwsh
        run: ./scripts/Validate-DocsSnippets.ps1

  sample-build:
    # Keeps samples/SampleApp (scaffolded by the CLI, wired to the source projects via
    # ProjectReference) building against the current library code. Not part of the
    # publish dependency chain.
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore sample
        run: dotnet restore samples/SampleApp/SampleApp.slnx

      # The sample keeps its own Directory.Packages.props (with advisory pins) that the
      # root scan never restores — scan it explicitly.
      - name: Check sample for vulnerable packages
        shell: pwsh
        run: |
          $output = dotnet list samples/SampleApp/SampleApp.slnx package --vulnerable --include-transitive 2>&1 | Out-String
          Write-Host $output
          if ($output -match 'High|Critical') {
            Write-Error "Vulnerable packages detected in SampleApp. Fail."
            exit 1
          }

      - name: Build sample
        run: dotnet build samples/SampleApp/SampleApp.slnx --configuration Release --no-restore

  publish:
    needs: [build, e2e, messaging-integration]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: nupkgs
          path: ./nupkgs

      - name: Push tagged package only
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          # Map MinVer tag prefix -> PackageId. Tag form: '<prefix>v<version>'.
          $prefixMap = @{
            'cli-v'           = 'ModulusKit.Cli'
            'mediator-v'      = 'ModulusKit.Mediator'
            'mediator-abs-v'  = 'ModulusKit.Mediator.Abstractions'
            'messaging-v'          = 'ModulusKit.Messaging'
            'messaging-abs-v'      = 'ModulusKit.Messaging.Abstractions'
            'messaging-rabbitmq-v' = 'ModulusKit.Messaging.RabbitMq'
            'messaging-asb-v'      = 'ModulusKit.Messaging.AzureServiceBus'
            'generators-v'    = 'ModulusKit.Generators'
            'analyzers-v'     = 'ModulusKit.Analyzers'
          }

          $tagName = "${env:GITHUB_REF}" -replace '^refs/tags/', ''
          Write-Host "Tag: $tagName"

          $matchedPrefix = $null
          $matchedPackage = $null
          # Sort longest prefix first so 'mediator-abs-v' wins over 'mediator-v'
          foreach ($prefix in ($prefixMap.Keys | Sort-Object Length -Descending)) {
            if ($tagName.StartsWith($prefix)) {
              $matchedPrefix = $prefix
              $matchedPackage = $prefixMap[$prefix]
              break
            }
          }

          if (-not $matchedPackage) {
            Write-Error "Tag '$tagName' does not match any known package prefix."
            exit 1
          }

          $version = $tagName.Substring($matchedPrefix.Length)
          $nupkg = "./nupkgs/$matchedPackage.$version.nupkg"
          Write-Host "Publishing $nupkg"

          if (-not (Test-Path $nupkg)) {
            Write-Error "Expected package not found: $nupkg"
            Get-ChildItem ./nupkgs | ForEach-Object { Write-Host "  $($_.Name)" }
            exit 1
          }

          dotnet nuget push $nupkg `
            --api-key $env:NUGET_API_KEY `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate
